[controller]
file = "controllers/controller_rl.py"

[deploy]
check_drone_start_pos = true
check_race_track = true
real_track_objects = true
[[deploy.drones]]
id = 10
channel = 100
drone_model = "cf21B_500"

[env]
control_mode = "attitude"
freq = 50
id = "DroneRacing-v0"
seed = 2
sensor_range = 0.7

[sim]
attitude_freq = 500
camera = -1
drone_model = "cf21B_500"
freq = 500
physics = "first_principles"
render = false
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [ 0.0, 0.0, 0.0,]

[env.track]
randomize = false
[[env.track.drones]]
pos = [ -0.045987870544195175, -0.06966908276081085, 0.004494445398449898,]
rpy = [ 0.0, 0.0, 0.0,]
vel = [ 0, 0, 0,]
ang_vel = [ 0, 0, 0,]

[[env.track.gates]]
pos = [ 1.8761560916900635, 0.18276886641979218, 0.7299190163612366,]
rpy = [ 0.0, 0.0, 2.1843958224084106,]

[[env.track.gates]]
