rpy = [ 0.0, 0.0, -0.4105114103818961,]

[[env.track.obstacles]]
pos = [ 0.8297939300537109, 0.3623189926147461, 1.5068278312683105,]

[[env.track.obstacles]]
pos = [ -1.7081749439239502, -0.5698319673538208, 1.535396933555603,]

[[env.track.obstacles]]
