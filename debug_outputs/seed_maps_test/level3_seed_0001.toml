[controller]
file = "controllers/controller_rl.py"

[deploy]
check_drone_start_pos = true
check_race_track = true
real_track_objects = true
[[deploy.drones]]
id = 10
channel = 100
drone_model = "cf21B_500"

[env]
control_mode = "attitude"
freq = 50
id = "DroneRacing-v0"
seed = 1
sensor_range = 0.7

[sim]
attitude_freq = 500
camera = -1
drone_model = "cf21B_500"
freq = 500
physics = "first_principles"
render = false
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [ 0.0, 0.0, 0.0,]

[env.track]
randomize = false
[[env.track.drones]]
pos = [ 0.05358297750353813, 0.007419514935463667, 0.017839698120951653,]
rpy = [ 0.0, 0.0, 0.0,]
vel = [ 0, 0, 0,]
ang_vel = [ 0, 0, 0,]

[[env.track.gates]]
pos = [ -0.3656761050224304, 0.05825665593147278, 0.6344931721687317,]
rpy = [ 0.0, 0.0, -2.785430443706659,]

[[env.track.gates]]
pos = [ -1.7059316635131836, -0.7392070889472961, 1.2627016305923462,]
rpy = [ 0.0, 0.0, -1.8491242127921903,]

[[env.track.gates]]
pos = [ 0.1631677746772766, -0.7584215402603149, 0.6803190112113953,]
rpy = [ 0.0, 0.0, -0.7699703865827339,]

[[env.track.gates]]
